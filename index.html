<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Practice</title>
    <link rel="stylesheet" href="./css/Normalize.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="page">
        <header>
            <div class="header">
                <div class="headerleft">
                    <img src="./images/plant_blushing_bromeliad.png" alt="plant picture" class="img">
                    
                    
                </div>
                <div class="headerright">
                    <img src="./images/plant_african_violet.png" alt="plant picture" class="img">
                    <p>African Violet</p>
                    <p class="price">$199.00</p>
                </div>
            </div>
        </header>
        <div class="blogs">
            <div class="blogsheader">
                <p class="blogsheadermaintext">Our Blog Posts</p>
                <p class="blogsheadersecondtext">We are an online plant shop offering a wide range of cheap and trendy plants.</p>
            </div>
                <div class="blogstore">
                    <div class="blog">
                        <img src="./images/plant_aluminum_plant.png" alt="plant picture" class="img">
                        <p>Aluminum Plant</p>
                        <p class="price">$179.00</p>
                    </div>
                    <div class="blog">
                        <img src="./images/plant_bird's_nest_fern.png" alt="plant picture" class="img">
                        <p>Bird's Nest Fern</p>
                        <p class="price">$99.00</p>
                    </div>
                    <div class="blog">
                        <img src="./images/plant_broadleaf_lady_palm.jpeg" alt="plant picture" class="img">
                        <p>Broadleaf Lady Palm</p>
                        <p class="price">$59.00</p>
                    </div>
                    <div class="blog">
                        <img src="./images/plant_chinese_evergreen.png" alt="plant picture" class="img">
                        <p>Chinese Evergreen</p>
                        <p class="price">$39.00</p>
            </div>
        </div>
    </div>
</body>
</html>
