<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantstore</title>
    <link rel="stylesheet" href="./css/Normalize.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <div class="column-left">
            <aside>
                <nav class="category-list">
                    <a class="sidetext">Categories</a>
                    <li class="category" id="activecategory">House Plants</li>
                    <li class="category">Potter Plants</li>
                    <li class="category">Seeds</li>
                    <li class="category">Small Plants</li>
                    <li class="category">Big Plants</li>
                    <li class="category">Succulents</li>
                    <li class="category">Trerrariums</li>
                    <li class="category">Gardening</li>
                    <li class="category">Accessories</li>
                </nav>
                <div class="sidebaner">
                    <div class="sidehang">Super Sale</div>
                    <div class="sale"> UP TO 75% OFF</div>
                    <div class="bannerpic"></div>
                </div>
            </aside>
        </div>
        <div class="column-right">
            <div class="Sortfilter">
                        <a class="filter-item" id="activefilter">All Plant</a>
                        <a class="filter-item">New Arrivals</a>
                        <a class="filter-item">Sale</a>
                        <a class="textcategory">Sort by:</a>
                        <botton class="butsort">
                            Default
                            <svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" fill="none">
                            <path d="M10.6667 1.66669L6.00004 6.33335L1.33337 1.66669" stroke="#3D3D3D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </botton>
            </div>
            <div class="store">

            </div>
        </div>
        <footer>
            <nav class="pagesort">
                <li class="pagesortbutton" id="active">1</li>
                <li class="pagesortbutton">2</li>
                <li class="pagesortbutton">3</li>
                <li class="pagesortbutton">4</li>
            </nav>
        </footer>
    </div>
</body>
</html>
